<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breadfast SOP Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Tajawal', sans-serif; background: #0D0F12; color: #EEF0F8; font-size: 15px; overflow: hidden; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #2a2f3d; border-radius: 4px; }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; }

/* HEADER */
.header {
  background: #111318;
  border-bottom: 1px solid rgba(255,255,255,.07);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.hlogo {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(0,194,123,.12); border: 1px solid rgba(0,194,123,.2);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.htitle { font-size: 15px; font-weight: 700; }
.hsub { font-size: 11px; color: #545D63; margin-top: 1px; }
.hlive {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,194,123,.1); border: 1px solid rgba(0,194,123,.2);
  border-radius: 20px; padding: 5px 12px;
  font-size: 11px; font-weight: 600; color: #00C27B; letter-spacing: .05em;
}
.hlive-dot { width: 6px; height: 6px; border-radius: 50%; background: #00C27B; animation: glow 2s infinite; }
@keyframes glow { 0%,100%{opacity:1} 50%{opacity:.4} }

/* CHAT */
.chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }

/* WELCOME */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: 32px 20px; margin: auto 0;
}
.welcome-icon {
  width: 72px; height: 72px; border-radius: 22px;
  background: rgba(0,194,123,.1); border: 1px solid rgba(0,194,123,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; margin-bottom: 18px;
}
.welcome h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.welcome p { font-size: 13px; color: #8B95B0; line-height: 1.8; max-width: 380px; }

.sugg-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 24px; width: 100%; max-width: 480px;
}
.sugg {
  background: #181B23; border: 1px solid #1F2330;
  border-radius: 12px; padding: 10px 14px;
  font-size: 12px; color: #8B95B0; cursor: pointer;
  font-family: inherit; text-align: right; line-height: 1.5;
  transition: all .15s;
}
.sugg:hover { border-color: #00C27B; color: #00C27B; background: rgba(0,194,123,.05); }

/* MESSAGES */
.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

.avatar {
  width: 32px; height: 32px; min-width: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; font-weight: 700;
}
.msg.user .avatar { background: #00C27B; color: #000; }
.msg.bot .avatar { background: #181B23; border: 1px solid #1F2330; font-size: 16px; }

.bubble {
  border-radius: 16px; padding: 12px 16px;
  font-size: 14px; line-height: 1.8;
}
.msg.user .bubble {
  background: #00C27B; color: #000; font-weight: 500;
  border-bottom-left-radius: 4px;
}
.msg.bot .bubble {
  background: #181B23; border: 1px solid #1F2330;
  color: #C8D0E0; border-bottom-right-radius: 4px;
}
.msg.bot .bubble strong { color: #EEF0F8; }
.msg.bot .bubble h3 { color: #EEF0F8; font-size: 14px; margin: 10px 0 6px; }
.msg.bot .bubble ul { padding-right: 16px; margin: 8px 0; }
.msg.bot .bubble li { margin-bottom: 5px; }
.msg.bot .bubble p { margin-bottom: 8px; }
.msg.bot .bubble p:last-child { margin-bottom: 0; }
.msg.bot .bubble hr { border: none; border-top: 1px solid #1F2330; margin: 10px 0; }
.msg.bot .bubble blockquote {
  border-right: 3px solid #00C27B; padding: 8px 12px;
  background: #0D0F12; border-radius: 0 8px 8px 0; margin: 8px 0; color: #8B95B0;
}

.src { font-size: 10px; color: #454D63; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
.src-dot { width: 4px; height: 4px; border-radius: 50%; background: #00C27B; }

/* TYPING */
.typing-wrap { display: flex; gap: 10px; align-self: flex-start; animation: fadeUp .25s ease; }
.typing {
  background: #181B23; border: 1px solid #1F2330;
  border-radius: 16px; border-bottom-right-radius: 4px;
  padding: 14px 18px; display: flex; gap: 5px; align-items: center;
}
.tdot { width: 7px; height: 7px; border-radius: 50%; background: #454D63; animation: bounce .9s infinite; }
.tdot:nth-child(2){animation-delay:.15s} .tdot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}

/* INPUT */
.input-area {
  flex-shrink: 0; padding: 14px 20px 18px;
  background: #111318; border-top: 1px solid rgba(255,255,255,.07);
}
.input-box {
  display: flex; align-items: flex-end; gap: 10px;
  background: #181B23; border: 1px solid #1F2330;
  border-radius: 14px; padding: 10px 12px;
  transition: border-color .2s;
}
.input-box:focus-within { border-color: #00C27B; }
textarea {
  flex: 1; background: none; border: none; outline: none;
  font-family: inherit; font-size: 14px; color: #EEF0F8;
  resize: none; max-height: 100px; min-height: 22px; line-height: 1.6;
}
textarea::placeholder { color: #454D63; }
.send {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: #00C27B; border: none; cursor: pointer; color: #000;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.send:hover { background: #009962; transform: scale(1.05); }
.send:disabled { background: #1F2330; cursor: not-allowed; transform: none; color: #454D63; }
.hint { font-size: 11px; color: #454D63; text-align: center; margin-top: 8px; }

@media(max-width:600px){
  .sugg-grid { grid-template-columns: 1fr; }
  .msg { max-width: 92%; }
  .chat { padding: 16px; }
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <div class="hlogo">🤖</div>
      <div>
        <div class="htitle">Breadfast SOP Assistant</div>
        <div class="hsub">Community Development</div>
      </div>
    </div>
    <div class="hlive"><div class="hlive-dot"></div> AI</div>
  </header>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1>اسألني أي حاجة</h1>
      <p>بعرف كل إجراءات التشغيل الخاصة بـ Breadfast.<br>اكتب سؤالك وهرد عليك من الـ SOPs فورًا.</p>
      <div class="sugg-grid">
        <button class="sugg" onclick="ask(this.innerText)">إيه درجة حرارة الفريزر الطبيعية؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إزاي أتعامل مع شكوى Missing Item؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إيه خطوات استلام الشيفت؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إيه الفرق بين Return و Rejection؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إزاي أطلب إجازة على موارد؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إزاي أشتغل على Odoo Transfer History؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إيه هو الـ OOV؟</button>
        <button class="sugg" onclick="ask(this.innerText)">إزاي أتعامل مع Extra Item Complaint؟</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="inp" placeholder="اكتب سؤالك هنا..." rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="send" id="sendBtn" onclick="send()">➤</button>
    </div>
    <div class="hint">Enter للإرسال · Shift+Enter لسطر جديد</div>
  </div>

</div>
<script>
const GEMINI_KEY = 'AIzaSyCNNEKkKprpSykQ-1g9hPRhSN0tGu7wgTw';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

const SOP_DATA = `
=== Hygiene & Temperature (Inventory Lead) ===
الفريزر: من -18 إلى -30 درجة مئوية. إذا وصلت الحرارة -12 أو أعلى → خطر فوري، أبلغ الجودة.
القياس: وجّه الجهاز على المنتج مش الهواء. خد أكتر من قراءة. سجّل في المكان المخصص.
Hygiene Checklist: أداة يومية لضمان النظافة ومنع التلوث. بدونها الشغل عشوائي.

=== FP Stock Management (Inventory Lead) ===
إدارة المخزون: الكمية المتاحة للبيع، الكمية المحجوزة (Reserved)، الكمية داخل الفرع.
إضافة/خصم منتج يدوياً. سجل حركة المنتج كاملة. تفاصيل: وصف المنتج، تاريخ التحديث، تاريخ Validation.
البحث: اسم المنتج أو الباركود. Export: استخراج كل المنتجات في Excel.

=== FP Return Management (Inventory Lead) ===
أنواع: Return (مرتجعات) / Rejection (مرفوضة).
البحث: رقم Transfer أو رقم Odoo. فلاتر: Internal Category، Destination.
حالات: Not Available to Sell → Sent Transfers → Confirmed & Delivered.
الإجراءات: Send (بعد المراجعة والتأكد من المنتجات) / View (عرض التفاصيل).
رقم Odoo هو المرجع الأساسي لتسليم المرتجعات للشركات الخارجية.

=== Return Page (Inventory Lead) ===
لإعادة المنتجات للمخزون عند إلغاء الطلب أو شكوى العميل.
خطوات: 1-Collect 2-Review 3-فحص المنتج (صلاحية، تلف، جودة) 4-تحديد السبب والـ Save.
Customer Compensation: عند شكوى فقدان منتج بعد التأكد من التسليم السليم.
Commercial: عند اكتشاف منتج زائد فعلياً في المخزن.

=== Odoo Orders / Barcode (Inventory Lead) ===
المرجع الأساسي لاستلام البضاعة. أوردرات داخلية (Internal) وموردين (Suppliers).
يتيح: استعراض الأوردرات، تسجيل الكميات، مطابقة الفعلي بالأوردر، اكتشاف الفروقات.
Transfer History: سجل شامل لكل العمليات. للمراجعة والبحث في أي وقت.

=== Check OOV & Expiry Filter (Inventory Lead) ===
OOV = Out Of Validity: انتهت صلاحية بيعه أو قاربت. EXPIRED: منتهي فعلياً. SHELF LIFE: عمر الرف المتبقي.
الهدف: إزالة أي OOV أو Expired من الرفوف فوراً. متابعة يومية في كل شيفت.

=== Complaints Response (Inventory Lead) ===
الرد على شكاوى العملاء عبر Freshdesk بسرعة لتجنب التجربة السلبية.
Wrong Item: استلام منتج غلط. أسباب: Force Scan غير دقيق، خلط في Packing، وصف غلط على التطبيق.
Missing Item: طلب ناقص. أسباب: عدم إحكام Seal الأكياس.
Dirty Package: تغليف وسخ أو سيئ. أسباب: أتربة، أصناف غير متوافقة معاً.
Extra Item: أصناف زيادة. الحل: Double Check قبل الإغلاق من Packer وInventory Lead.

=== Shift Receival (Inventory Lead) ===
1- مراجعة تقرير الشيفت السابق. 2- فحص المخزون. 3- التحقق من الأنظمة. 4- تسجيل الملاحظات. 5- التوقيع.

=== Stock Take (Inventory Lead) ===
جرد دوري: إعداد أوراق الجرد، عد الكميات الفعلية، مقارنتها بالنظام، تسجيل الفروقات، إرسال التقرير.

=== Package (Inventory Lead) ===
التحقق من سلامة مواد التغليف، تغليف وفق المعيار، إغلاق محكم، مراجعة بيانات المنتج.

=== Internal & External Rules (Inventory Lead) ===
الالتزام بقواعد السلوك المهني، الصحة والسلامة، التعامل المحترف مع العملاء، الإبلاغ عن المخالفات.

=== On Ground (Inventory Lead) ===
جولة تفتيشية، متابعة الفريق، حل المشاكل فوراً، توثيق الملاحظات.

=== Control Room (Logistic Coordinators) ===
مراجعة حالة الطلبات، متابعة المناديب، التعامل مع المتأخرات فوراً، التنسيق مع التجهيز، تسجيل المشاكل.

=== Cash Management (Logistic Coordinators) ===
استلام المدفوعات النقدية من المناديب، تسجيل كل معاملة فور حدوثها، تسوية الكاش في نهاية الشيفت، إبلاغ المسؤول عند الفروق، تسليم الكاش مع تقرير التسوية.

=== Freshdesk Internal Request (Logistic Coordinators) ===
فتح تذكرة داخلية، تحديد الأولوية، متابعة المفتوح، الرد خلال SLA، إغلاق وتوثيق.

=== Freshdesk Complaint (Logistic Coordinators) ===
فتح تذكرة شكوى، تصنيف وتحديد الأولوية، تصعيد للمستوى المناسب، متابعة حتى الإغلاق.

=== Preparing Team (Logistic Coordinators) ===
توزيع المهام، متابعة التجهيز، فحص الجودة قبل الشحن، تقييم الإنتاجية يومياً.

=== Auto Assign Engine (Logistic Coordinators) ===
التحقق من تشغيل المحرك، مراجعة توزيع الطلبات على المناديب، التدخل عند الخلل، تقرير الأداء.

=== Odoo Employee (Assistant Manager) ===
إضافة موظف جديد، تعديل البيانات، متابعة الحضور والغياب، الإجازات، إنهاء الخدمة، تقارير HR.

=== Employee KPIs Sheets (Assistant Manager) ===
تقييم الأداء: سرعة التنفيذ، الالتزام، معدل الأخطاء، الإنتاجية، الجودة.
فوايد: روح تنافسية، تحديد نقاط الضعف، ربط KPIs بالحوافز والخصومات.

=== Complaint Tracking (Assistant Manager) ===
Logistic Coordinator وInventory Lead: مراقبة من زاوية التنفيذ.
Validation Team: تحديد صحة أو خطأ الشكوى (ممكن يغلطوا هم برضو).
Assistant Manager بعد تأكيد الشكوى: تحليل، تحديد الأكثر تكراراً، Action Plan، تنسيق، متابعة.
مثال Missing Item: تحقيق في السبب (picking error؟ نظام؟ تغليف؟) → حل → تنسيق → مراقبة التحسن.

=== Mawared (Assistant Manager) ===
نظام حضور وانصراف. جدولة الشيفتات: تاريخ البداية، اختيار الموظفين، ساعات العمل (9 ساعات)، مكان الحضور.
أنواع الطلبات:
- Annual Leave: سنوية / Emergency للمفاجئة
- Permissions (أذونات): 3 ساعات شهرياً لكل موظف (تأخير أو انصراف مبكر)
- Unpaid Leave: بدون راتب
- Ignore Assignments: تجاهل مهمة من الحسابات
- Day Off Request: طلب يوم إجازة
- Shift Change: تغيير الشيفت (صباحي ↔ مسائي)
- Open Request: إجازة مرضية مع المستندات
- Overtime: بعد الشيفت أو في يوم الراحة
- Study/Exam Leave: إجازة امتحانات
تصدير التقرير: اسم الموظف + الفترة + الفلتر + تحميل.
نقل موظف: Requests → Outgoing → Fixed Transfer → اختر الموظف → تاريخ النقل → الفرع الجديد → المدير الجديد.

=== Auto Assign Engine Settings (Assistant Manager) ===
مراجعة قواعد التوزيع، تعديل الأولويات، تحديث المناطق، اختبار المحرك بعد التعديل.

=== Fresh Service (Assistant Manager) ===
طلبات IT والصيانة: رفع تذكرة مع وصف المشكلة، تحديد الأولوية، متابعة، تأكيد الحل.

=== Adjustment Approval (Assistant Manager) ===
استلام طلب التعديل، مراجعة المبررات، قرار الموافقة أو الرفض، توثيق في النظام.
`;

const SYSTEM = `أنت مساعد ذكي متخصص في إجراءات التشغيل (SOPs) الخاصة بفريق Community Development في Breadfast.
مهمتك الإجابة على أسئلة الفريق بناءً على قاعدة البيانات أدناه فقط.
قواعد:
- رد بالعربي دايماً إلا لو سألك بالإنجليزي
- استشهد بـ SOP محدد
- لو المعلومة مش موجودة في قاعدة البيانات، قول ذلك بوضوح
- كن مختصراً ومنظماً واستخدم bullet points للخطوات
- لا تخترع معلومات

قاعدة بيانات الـ SOPs:
${SOP_DATA}`;

let history = [];
let loading = false;

function ask(q) {
  document.getElementById('inp').value = q;
  send();
}

function send() {
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q || loading) return;

  // Hide welcome
  const w = document.getElementById('welcome');
  if (w) w.remove();

  loading = true;
  document.getElementById('sendBtn').disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  appendMsg('user', q);
  appendTyping();

  history.push({ role: 'user', parts: [{ text: q }] });

  // Build contents: inject system prompt into first message
  const contents = history.map((m, i) => {
    if (i === 0 && m.role === 'user') {
      return { role: 'user', parts: [{ text: SYSTEM + '\n\nالسؤال: ' + m.parts[0].text }] };
    }
    return m;
  });

  fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: contents,
      generationConfig: { maxOutputTokens: 800, temperature: 0.3 }
    })
  })
  .then(r => r.json())
  .then(data => {
    removeTyping();
    if (data.error) throw new Error(data.error.message);
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'لم أتمكن من الإجابة.';
    history.push({ role: 'model', parts: [{ text: reply }] });
    appendMsg('bot', reply);
  })
  .catch(err => {
    history.pop();
    removeTyping();
    appendMsg('bot', '⚠️ حدث خطأ: ' + err.message + '\nتأكد من اتصالك بالإنترنت وحاول مرة تانية.');
  })
  .finally(() => {
    loading = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
  });
}

function appendMsg(role, text) {
  const chat = document.getElementById('chat');

  const sopNames = ['Hygiene','FP Stock','FP Return','Return Page','Odoo','OOV','Complaints','Shift','Stock Take','Package','Control Room','Cash','Freshdesk','Preparing','Auto Assign','KPIs','Complaint Tracking','Mawared','Fresh Service','Adjustment'];
  const mentioned = sopNames.filter(s => text.includes(s));
  const src = mentioned.length ? mentioned.slice(0,3).join(', ') : 'Breadfast SOPs';

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? 'أنت' : '🤖'}</div>
    <div>
      <div class="bubble">${fmt(text)}</div>
      ${role === 'bot' ? `<div class="src"><div class="src-dot"></div>${src}</div>` : ''}
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function appendTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing-wrap'; div.id = 'typing';
  div.innerHTML = `<div class="avatar">🤖</div><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^# (.+)$/gm,'<h3>$1</h3>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(?!<[hul]|<br)(.+)$/gm,'<p>$1</p>');
}
</script>
</body>
